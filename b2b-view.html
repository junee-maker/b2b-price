<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디지털존 B2B 가격 안내</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:13px}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:#fff;border-radius:16px;padding:40px 36px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.1);min-width:320px;max-width:400px;width:100%}
.login-logo{font-size:28px;margin-bottom:8px}
.login-card h1{font-size:18px;font-weight:700;margin-bottom:4px;color:#1a1a2e}
.login-card p{font-size:12px;color:#6b7280;margin-bottom:24px}
.login-label{font-size:11px;color:#4b5563;text-align:left;display:block;margin-bottom:4px;font-weight:500}
.login-input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;font-family:inherit;outline:none;color:#1a1a2e;margin-bottom:12px}
.login-input:focus{border-color:#4359FF}
.login-btn{width:100%;padding:11px;background:#4359FF;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
.login-btn:hover{background:#3448e0}
.login-err{font-size:12px;color:#dc2626;margin-top:8px;display:none}
#app{display:none;min-height:100vh}
.app-header{background:#fff;border-bottom:1px solid #e8eaed;padding:0 24px;height:56px;display:flex;align-items:center;gap:12px}
.app-logo{font-size:15px;font-weight:700;color:#1a1a2e}.app-logo span{color:#4359FF}
.app-client{font-size:12px;color:#6b7280;background:#f3f4f6;padding:3px 10px;border-radius:10px}
.app-space{flex:1}
.app-date{font-size:11px;color:#9ca3af}
.logout-link{font-size:11px;color:#9ca3af;cursor:pointer;padding:3px 8px;border:1px solid #e5e7eb;border-radius:5px}
main{max-width:1200px;margin:0 auto;padding:20px 24px}
.page-title{font-size:18px;font-weight:700;margin-bottom:4px}
.page-sub{font-size:12px;color:#6b7280;margin-bottom:20px}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.product-card{background:#fff;border:1px solid #e0e3e8;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.product-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.pc-header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:14px 16px}
.pc-name{font-size:13px;font-weight:700;color:#fff;line-height:1.4}
.pc-vendor{font-size:10px;color:rgba(255,255,255,.75);margin-top:4px}
.pc-body{padding:14px 16px}
.pc-stock{margin-bottom:10px}
.stock-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.stock-ok{background:#d1fae5;color:#065f46}
.stock-low{background:#fef9c3;color:#854d0e}
.stock-none{background:#fee2e2;color:#991b1b}
.pc-prices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.price-box{background:#f8f9fa;border-radius:8px;padding:10px 12px}
.price-box-label{font-size:9px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.price-box-val{font-size:16px;font-weight:700;color:#1a1a2e}
.price-box-sub{font-size:10px;color:#9ca3af;margin-top:2px}
.card-box{background:#eff6ff}.card-box .price-box-val{color:#1d4ed8}
.cash-box{background:#f0fdf4}.cash-box .price-box-val{color:#15803d}
.empty{text-align:center;padding:60px 20px;color:#9ca3af;font-size:14px}
#loading{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;font-size:13px;color:#374151}
.spinner{width:26px;height:26px;border:3px solid #e5e7eb;border-top-color:#4359FF;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span>불러오는 중...</span></div>

<div id="loginScreen" style="display:none">
  <div class="login-card">
    <div class="login-logo">📦</div>
    <h1>디지털존 B2B</h1>
    <p>담당자에게 받은 업체명과 비밀번호를 입력하세요</p>
    <label class="login-label">업체명</label>
    <input class="login-input" id="inp-name" placeholder="업체명 입력" oninput="clearErr()">
    <label class="login-label">비밀번호</label>
    <input class="login-input" id="inp-pw" type="password" placeholder="비밀번호 입력" oninput="clearErr()" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr">업체명 또는 비밀번호가 올바르지 않습니다</div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="app-header">
    <div class="app-logo">디지털존 <span>B2B</span></div>
    <span class="app-client" id="clientNameBadge"></span>
    <div class="app-space"></div>
    <span class="app-date" id="todayDate"></span>
    <span class="logout-link" onclick="doLogout()">로그아웃</span>
  </div>
  <main>
    <div class="page-title" id="pageTitle">안녕하세요</div>
    <div class="page-sub">현재 제공 가능한 제품 목록입니다. 문의사항은 담당자에게 연락해주세요.</div>
    <div class="products-grid" id="productsGrid"></div>
  </main>
</div>

<!-- 일반 스크립트 먼저 로드 -->
<script>
var _allClients = [];
var _allProducts = [];

function clearErr(){
  document.getElementById("loginErr").style.display="none";
}

function doLogin(){
  var name=(document.getElementById("inp-name").value||"").trim();
  var pw=(document.getElementById("inp-pw").value||"").trim();
  if(!name||!pw){ document.getElementById("loginErr").style.display="block"; return; }
  var cl=_allClients.find(function(c){ return c.name===name && c.password===pw; });
  if(!cl){ document.getElementById("loginErr").style.display="block"; return; }
  sessionStorage.setItem("b2b_client", cl.id);
  showApp(cl);
}

function doLogout(){
  sessionStorage.removeItem("b2b_client");
  location.reload();
}

function showApp(cl){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("clientNameBadge").textContent=cl.name;
  document.getElementById("pageTitle").textContent=cl.name+" 전용 가격 안내";
  var today=new Date(), m=today.getMonth()+1, d=today.getDate();
  document.getElementById("todayDate").textContent=today.getFullYear()+"년 "+m+"월 "+d+"일 기준";

  var keys=cl.productKeys||[];
  var seen={}, products=[];
  _allProducts.forEach(function(r){
    var key=(r.dzCode||"")+"|||"+(r.name||"");
    if(keys.indexOf(key)>=0 && !seen[key]){ seen[key]=true; products.push(r); }
  });

  if(!products.length){
    document.getElementById("productsGrid").innerHTML='<div class="empty" style="grid-column:1/-1">아직 배정된 제품이 없습니다.<br>담당자에게 문의해주세요.</div>';
    return;
  }

  var order=[], map={};
  products.forEach(function(r){
    var key=(r.dzCode||"")+"|||"+(r.name||"");
    if(!map[key]){ map[key]=[]; order.push(key); }
    map[key].push(r);
  });

  document.getElementById("productsGrid").innerHTML=order.map(function(k){
    var grp=map[k];
    grp.sort(function(a,b){ return (+a.cardSellEx||0)-(+b.cardSellEx||0); });
    var rep=grp[0];
    var cardPrice=Math.round((+(rep.cardSellEx||0))*1.1);
    var cashPrice=Math.round((+(rep.cashSellEx||0))*1.1);
    var st=rep.stock;
    var stockBadge="";
    if(st!==""&&st!==undefined&&st!==null){
      var n=+st;
      stockBadge=n>10?'<span class="stock-badge stock-ok">재고 '+n+'개</span>':n>0?'<span class="stock-badge stock-low">재고 '+n+'개 (소량)</span>':'<span class="stock-badge stock-none">품절</span>';
    }
    function esc(s){ return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
    return '<div class="product-card">'+
      '<div class="pc-header"><div class="pc-name">'+esc(rep.name||"")+'</div><div class="pc-vendor">'+esc(rep.vendor||"")+'</div></div>'+
      '<div class="pc-body">'+
        (stockBadge?'<div class="pc-stock">'+stockBadge+'</div>':'')+
        '<div class="pc-prices">'+
          '<div class="price-box card-box"><div class="price-box-label">카드가</div><div class="price-box-val">'+(cardPrice?cardPrice.toLocaleString("ko-KR")+"원":"미정")+'</div><div class="price-box-sub">VAT 포함</div></div>'+
          '<div class="price-box cash-box"><div class="price-box-label">현금가</div><div class="price-box-val">'+(cashPrice?cashPrice.toLocaleString("ko-KR")+"원":"미정")+'</div><div class="price-box-sub">VAT 포함</div></div>'+
        '</div>'+
      '</div></div>';
  }).join("");
}
</script>

<!-- Firebase ESM 나중에 로드 -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs }
  from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

const cfg={apiKey:"AIzaSyCbjHxYjPKd5HqSylP5lvls1GHdcylK1XU",authDomain:"authentication-7ee4e.firebaseapp.com",projectId:"authentication-7ee4e",storageBucket:"authentication-7ee4e.firebasestorage.app",messagingSenderId:"349583834213",appId:"1:349583834213:web:9c2bf9251a87f1ef3ada8c"};

try {
  const fbApp = initializeApp(cfg);
  const db = getFirestore(fbApp);
  const [cSnap, pSnap] = await Promise.all([
    getDocs(collection(db,"b2bClients")),
    getDoc(doc(db,"b2bData","products"))
  ]);
  _allClients = cSnap.docs.map(d=>({id:d.id,...d.data()}));
  _allProducts = pSnap.exists() ? (pSnap.data().rows||[]) : [];
} catch(e) {
  console.warn("로드 실패:", e);
}

document.getElementById("loading").style.display="none";

// URL 파라미터로 업체명 자동 채우기 (편의용) - 비밀번호는 항상 입력 필요
const cid = new URLSearchParams(window.location.search).get("c");
if(cid){
  const cl = _allClients.find(c=>c.id===cid);
  if(cl){
    const nameEl = document.getElementById("inp-name");
    if(nameEl) nameEl.value = cl.name;
  }
}
// 세션 로그인 유지 (같은 브라우저 세션 내에서만)
const savedId = sessionStorage.getItem("b2b_client");
const savedCl = savedId ? _allClients.find(c=>c.id===savedId) : null;
if(savedCl){
  showApp(savedCl);
} else {
  document.getElementById("loginScreen").style.display="flex";
}
</script>
</body>
</html>
