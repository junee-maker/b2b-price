<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디지털존 B2B 가격 제안</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f4f5f7;color:#1a1a2e;font-size:13px}

/* 로그인 */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:#fff;border-radius:14px;padding:48px 40px;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,.07);min-width:300px}
.login-card h1{font-size:19px;font-weight:600;margin-bottom:6px}
.login-card p{font-size:13px;color:#6b7280;margin-bottom:28px}
.google-btn{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:11px 18px;font-size:13px;font-weight:500;color:#374151;cursor:pointer;width:100%;justify-content:center}
.google-btn:hover{background:#f9fafb}
.google-btn svg{width:18px;height:18px;flex-shrink:0}

/* 앱 */
#app{display:none;flex-direction:column;height:100vh;overflow:hidden}
header{flex-shrink:0;background:#fff;border-bottom:1px solid #e8eaed;padding:0 20px;height:50px;display:flex;align-items:center;gap:10px}
.logo{font-size:14px;font-weight:600}.logo span{color:#4359FF}
.hdr-link{font-size:11px;color:#4359FF;text-decoration:none;border:1px solid #c7d2fe;border-radius:5px;padding:3px 10px}
.hdr-link:hover{background:#eef2ff}
.hdr-space{flex:1}
.user-info{display:flex;align-items:center;gap:8px;font-size:12px;color:#343a40}
.avatar{width:26px;height:26px;border-radius:50%;background:#4359FF;color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center}
.logout-btn{font-size:11px;color:#374151;background:none;border:1px solid #d1d5db;border-radius:5px;padding:3px 9px;cursor:pointer}

.content{flex:1;display:flex;flex-direction:column;padding:12px 18px 0;overflow:hidden}

/* 툴바 */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.toolbar-title{font-size:14px;font-weight:600}
.spacer{flex:1}
.btn{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid #d1d5db;background:#fff;cursor:pointer;color:#1a1a2e;font-family:inherit;white-space:nowrap}
.btn:hover{background:#f4f5f7}
.btn-primary{background:#4359FF;color:#fff;border-color:#4359FF}
.btn-primary:hover{background:#3448e0}
.btn-danger{color:#dc2626;border-color:#fca5a5}
.btn-danger:hover{background:#fef2f2}

/* 제품 검색 바 */
.search-bar{background:#fff;border:1px solid #e0e3e8;border-radius:10px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.search-wrap{position:relative;flex:1;max-width:460px}
.search-wrap input{width:100%;padding:8px 12px 8px 32px;border:1px solid #d1d5db;border-radius:7px;font-size:12px;font-family:inherit;outline:none;color:#1a1a2e}
.search-wrap input:focus{border-color:#4359FF}
.s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:#9ca3af;fill:none;pointer-events:none}
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #d1d5db;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:100;max-height:260px;overflow-y:auto;display:none}
.sr-item{padding:8px 12px;cursor:pointer;border-bottom:1px solid #f3f4f6;font-size:12px}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:#f0f4ff}
.sr-name{font-weight:500;color:#1a1a2e}
.sr-sub{font-size:10px;color:#6b7280;margin-top:2px}

/* 테이블 */
.table-outer{flex:1;overflow:auto;border-radius:9px;border:1px solid #d1d5db;background:#fff;margin-bottom:12px}
table{border-collapse:collapse;table-layout:fixed;width:100%;min-width:1200px}
col.c-info{width:100px}
col.c-price{width:88px}
col.c-pct{width:72px}
col.c-act{width:80px}
thead tr:nth-child(1) th{position:sticky;top:0;z-index:12;background:#f1f3f5}
thead tr:nth-child(2) th{position:sticky;top:36px;z-index:12;background:#f1f3f5;border-bottom:2px solid #ced4da}
th{font-weight:600;font-size:11px;color:#343a40;text-align:center;white-space:nowrap;border-right:1px solid #dee2e6;border-bottom:1px solid #dee2e6;padding:0 6px;height:36px;vertical-align:middle}
th:last-child{border-right:none}
th.th-info{background:#f1f3f5;text-align:left;padding-left:10px}
th.th-buy{background:#e7edff !important;color:#2f4bcc}
th.th-card{background:#e3f2fd !important;color:#1565c0;font-size:11px}
th.th-cash{background:#f0f0f0 !important;color:#343a40;font-size:11px}
.th-sub{font-size:9px;font-weight:400;display:block;line-height:1.3;color:#555}

/* 제품명 행 */
tr.name-row td{background:#e7edff;border-top:2px solid #9fa8da;border-bottom:1px solid #c5cfe8;height:32px;padding:0 14px;font-size:12px;font-weight:700;color:#1a1a2e}
tr.name-row td a{color:#2f4bcc;text-decoration:none}
tr.name-row td a:hover{text-decoration:underline}
.shopby-btn{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:500;color:#f97316;background:#fff7ed;border:1px solid #fed7aa;border-radius:4px;padding:2px 7px;text-decoration:none;margin-left:8px;vertical-align:middle;white-space:nowrap}
.shopby-btn:hover{background:#ffedd5}
.shopby-btn svg{width:9px;height:9px}
.cnt{font-size:10px;font-weight:400;color:#6b7280;margin-left:8px}

/* 데이터 행 */
td{border-right:1px solid #e9ecef;border-bottom:1px solid #e9ecef;vertical-align:middle;padding:0;height:36px;overflow:hidden}
td:last-child{border-right:none}
tbody tr:nth-child(even) td{background:#f8f9fa}
td.td-card{background:#f0f7ff}
td.td-cash{background:#f4f4f4}
tbody tr:nth-child(even) td.td-card{background:#e6f2fb}
tbody tr:nth-child(even) td.td-cash{background:#ededed}
tbody tr:hover td{background:#dde6fb!important}

/* 최저가 강조 */
tr.best-price td:first-child{border-left:3px solid #10b981}
.best-badge{display:inline-block;font-size:9px;background:#d1fae5;color:#065f46;border-radius:3px;padding:1px 5px;margin-left:5px;vertical-align:middle;font-weight:600}

/* 셀 텍스트 */
.cv{display:flex;align-items:center;height:36px;padding:0 8px;font-size:12px;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cv-c{justify-content:center}
.cv-r{justify-content:flex-end}
.cv-bold{font-weight:700}

/* 인라인 편집 */
.ri{display:block;width:100%;height:36px;border:none;background:transparent;font-size:12px;color:#1a1a2e;font-family:inherit;outline:none;padding:0 8px;text-align:center}
.ri-l{text-align:left;padding-left:10px}
.ri-r{text-align:right;padding-right:8px}
.ri:hover{background:#f8f9ff}
.ri:focus{background:#eff6ff;border-bottom:2px solid #4359FF}
.ri::placeholder{color:#d1d5db;font-size:11px}

/* 마진 */
.pp{color:#16a34a;font-weight:700}.pn{color:#dc2626;font-weight:700}.pz{color:#374151}.pd{color:#9ca3af}

/* 액션 */
.act-cell{display:flex;align-items:center;justify-content:center;gap:3px;height:36px;padding:0 4px}
.edit-btn{font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid #c7d2fe;background:#eef2ff;color:#3b4fd8;cursor:pointer;font-family:inherit;font-weight:600}
.edit-btn:hover{background:#dde6ff}
.del-btn{font-size:10px;padding:3px 6px;border-radius:4px;border:1px solid #fca5a5;background:#fff;color:#ef4444;cursor:pointer;font-family:inherit}
.del-btn:hover{background:#fef2f2}

.empty-row td{text-align:center;padding:52px 0;color:#6b7280;font-size:13px}
#loading{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;font-size:13px;color:#374151}
.spinner{width:26px;height:26px;border:3px solid #e5e7eb;border-top-color:#4359FF;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;font-size:12px;padding:8px 18px;border-radius:8px;display:none;z-index:999}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span>불러오는 중...</span></div>
<div id="toast"></div>

<div id="loginScreen">
  <div class="login-card">
    <h1>B2B 가격 제안</h1>
    <p>관리자 계정으로 로그인하세요</p>

      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google로 로그인
    </button>

</div>

<div id="app">
  <header>
    <div class="logo">디지털존 <span>B2B 가격제안</span></div>
    <a href="https://junee-maker.github.io/price-manager/" class="hdr-link">← 단가관리</a>
    <a href="https://junee-maker.github.io/price-manager/dashboard.html" class="hdr-link">대시보드</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
import { getFirestore, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

const cfg={apiKey:"AIzaSyCbjHxYjPKd5HqSylP5lvls1GHdcylK1XU",authDomain:"authentication-7ee4e.firebaseapp.com",projectId:"authentication-7ee4e",storageBucket:"authentication-7ee4e.firebasestorage.app",messagingSenderId:"349583834213",appId:"1:349583834213:web:9c2bf9251a87f1ef3ada8c"};
const ALLOWED = ["emtlstodn@gmail.com"]; // B2B는 관리자만
const fbApp=initializeApp(cfg), auth=getAuth(fbApp), db=getFirestore(fbApp);

window._b2bfb = {
  signIn: ()=>signInWithPopup(auth, new GoogleAuthProvider()),
  signOut: ()=>fbSignOut(auth),
  loadPrice: async()=>{ const s=await getDoc(doc(db,"priceData","digitalzone-shared")); return s.exists()?s.data():null; }
};

const TO=setTimeout(()=>{ document.getElementById("loading").innerHTML='<p style="color:#dc2626">로드 실패. 새로고침 해주세요.</p>'; },8000);

onAuthStateChanged(auth, async user=>{
  clearTimeout(TO);
  document.getElementById("loading").style.display="none";
  if(!user){ document.getElementById("loginScreen").style.display="flex"; return; }
  if(!ALLOWED.includes(user.email)){
    alert("접근 권한이 없습니다. 관리자 계정으로 로그인해주세요.");
    await fbSignOut(auth); document.getElementById("loginScreen").style.display="flex"; return;
  }
  document.getElementById("avatarInitial").textContent=user.email[0].toUpperCase();
  document.getElementById("userEmail").textContent=user.email;
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="flex";
  // 단가관리 데이터 로드
  try {
    const d = await window._b2bfb.loadPrice();
    if(d) B2B._priceRows = d.rows||[];
  } catch(e){ console.error(e); }
  B2B.render();
});
</script>

<script>
var B2B = {
  rows: [],         // B2B 제안 목록 (단가관리에서 추가된 행)
  _priceRows: [],   // 단가관리 원본

  signIn:  function(){ window._b2bfb&&window._b2bfb.signIn().catch(function(e){ B2B.toast("로그인 실패: "+e.message); }); },
  signOut: function(){ window._b2bfb&&window._b2bfb.signOut().then(function(){ location.reload(); }); },

  // ── 제품 검색 추가 ─────────────────────────────
  onAddSearch: function(){
    var q = (document.getElementById("addSearch").value||"").toLowerCase().trim();
    var res = document.getElementById("addResults");
    if(!q){ res.style.display="none"; return; }
    if(!B2B._priceRows.length){ res.innerHTML='<div style="padding:10px;font-size:12px;color:#9ca3af">단가관리 데이터 로드 중...</div>'; res.style.display="block"; return; }

    var seen={}, matched=[];
    B2B._priceRows.forEach(function(r){
      if(!(r.name||"").toLowerCase().includes(q)) return;
      var key=(r.dzCode||"")+"|||"+(r.name||"");
      if(!seen[key]){ seen[key]=true; matched.push(r); }
    });

    if(!matched.length){ res.innerHTML='<div style="padding:10px;font-size:12px;color:#9ca3af">검색 결과 없음</div>'; res.style.display="block"; return; }

    res.innerHTML = matched.slice(0,12).map(function(r){
      return '<div class="sr-item" data-dz="'+B2B.esc(r.dzCode||"")+'" data-nm="'+B2B.esc(r.name||"")+'">' +
        '<div class="sr-name">'+B2B.esc(r.name||"")+'</div>' +
        '<div class="sr-sub">'+B2B.esc(r.vendor||"")+(r.buyEx?" · 매입 "+Number(r.buyEx).toLocaleString("ko-KR")+"원":"")+'</div>' +
        '</div>';
    }).join("");
    res.querySelectorAll(".sr-item").forEach(function(el){
      el.onmousedown = function(){ B2B.addProduct(this.dataset.dz, this.dataset.nm); };
    });
    res.style.display="block";
  },

  addProduct: function(dzCode, name){
    document.getElementById("addSearch").value="";
    document.getElementById("addResults").style.display="none";

    // 이미 목록에 있으면 스킵
    var existing = B2B.rows.find(function(r){ return r.dzCode===dzCode && r.name===name; });
    if(existing){ B2B.toast("이미 추가된 제품입니다"); return; }

    // 해당 제품의 모든 공급처 행 추가
    var candidates = B2B._priceRows.filter(function(r){ return r.dzCode===dzCode && r.name===name; });
    if(!candidates.length) return;

    candidates.forEach(function(r){
      B2B.rows.push({
        id: B2B.nid(),
        vendor:     r.vendor||"",
        dzCode:     r.dzCode||"",
        erpCode:    r.erpCode||"",
        name:       r.name||"",
        cycle:      r.cycle||"",
        buyEx:      r.buyEx||"",
        cardSellEx: r.cardSellEx||"",
        cashSellEx: r.cashSellEx||""
      });
    });
    B2B.render();
    B2B.toast(name+" 추가됨 ("+candidates.length+"개 거래처)");
  },

  // ── 행 저장 ────────────────────────────────────
  saveRow: function(rid){
    var r = B2B.rows.find(function(r){ return r.id===rid; });
    if(!r) return;
    var g = function(field){ var el=document.getElementById("ri-"+field+"-"+rid); return el?el.value.replace(/,/g,"").trim():""; };
    r.vendor=g("v"); r.dzCode=g("c"); r.erpCode=g("e");
    r.buyEx=g("b"); r.cardSellEx=g("cs"); r.cashSellEx=g("hs");
    B2B.render();
    B2B.toast("수정되었습니다");
  },

  delRow: function(rid){
    if(!confirm("이 행을 삭제할까요?")) return;
    B2B.rows = B2B.rows.filter(function(r){ return r.id!==rid; });
    B2B.render();
  },

  clearAll: function(){
    if(!confirm("전체 초기화할까요?")) return;
    B2B.rows=[];
    B2B.render();
  },

  // ── 실시간 계산 ────────────────────────────────
  lC: function(rid){
    var gn=function(id){ var el=document.getElementById(id); return el?+(el.value.replace(/,/g,"")||0):0; };
    var bEx=gn("ri-b-"+rid), cEx=gn("ri-cs-"+rid), hEx=gn("ri-hs-"+rid);
    var bInc=Math.round(bEx*1.1), cInc=Math.round(cEx*1.1), hInc=Math.round(hEx*1.1);
    var cMg=cEx>0?(cEx-bEx)/cEx*100:null, cPf=cMg!==null?cMg-2.64:null;
    var hMg=hEx>0?(hEx-bEx)/hEx*100:null, hPf=hInc>0?(hInc-bInc-330)/hInc*100:null;
    var fmtK=function(v){return v>0?v.toLocaleString("ko-KR"):"-";};
    var pH=function(val){
      if(val===null) return '<div class="cv cv-r pd">-</div>';
      var cls=val>1?"pp":val<0?"pn":"pz";
      return '<div class="cv cv-r '+cls+'">'+val.toFixed(2)+'%</div>';
    };
    var s=function(id,h){var el=document.getElementById(id);if(el)el.innerHTML=h;};
    s("rc-bi-"+rid, fmtK(bInc));
    s("rc-ci-"+rid, fmtK(cInc));
    s("rc-hi-"+rid, fmtK(hInc));
    s("rc-cm-"+rid, pH(cMg));
    s("rc-cp-"+rid, pH(cPf));
    s("rc-hm-"+rid, pH(hMg));
    s("rc-hp-"+rid, pH(hPf));
  },

  nF: function(el){ el.value=el.value.replace(/,/g,""); },
  nB: function(el, rid){ var v=parseFloat(el.value.replace(/,/g,"")); el.value=isNaN(v)?"":v.toLocaleString("ko-KR"); B2B.lC(rid); },

  // ── 렌더 ───────────────────────────────────────
  render: function(){
    var el = document.getElementById("tbody");
    if(!B2B.rows.length){
      el.innerHTML='<tr class="empty-row"><td colspan="15">위 검색창에서 제품명을 검색하여 추가하세요</td></tr>';
      return;
    }

    var calc=function(r){
      var bEx=+(r.buyEx||0), cEx=+(r.cardSellEx||0), hEx=+(r.cashSellEx||0);
      var bInc=Math.round(bEx*1.1), cInc=Math.round(cEx*1.1), hInc=Math.round(hEx*1.1);
      var cMg=cEx>0?(cEx-bEx)/cEx*100:null, cPf=cMg!==null?cMg-2.64:null;
      var hMg=hEx>0?(hEx-bEx)/hEx*100:null, hPf=hInc>0?(hInc-bInc-330)/hInc*100:null;
      return {bInc:bInc,cInc:cInc,hInc:hInc,cMg:cMg,cPf:cPf,hMg:hMg,hPf:hPf};
    };
    var fmtN=function(v){ var n=parseFloat((v+"").replace(/,/g,"")); return isNaN(n)?"":(n>0?n.toLocaleString("ko-KR"):""); };
    var fmtK=function(v){ return v>0?v.toLocaleString("ko-KR"):"-"; };
    var pCell=function(val){
      if(val===null) return '<div class="cv cv-r pd">-</div>';
      var cls=val>1?"pp":val<0?"pn":"pz";
      return '<div class="cv cv-r '+cls+'">'+val.toFixed(2)+'%</div>';
    };

    // 제품명+코드 기준 그룹핑
    var order=[], map={};
    B2B.rows.forEach(function(r){
      var k=(r.dzCode||"")+"|||"+(r.name||r.id);
      if(!map[k]){ map[k]=[]; order.push(k); }
      map[k].push(r);
    });

    var html="";
    order.forEach(function(k){
      var grp=map[k], rep=grp[0];
      var url=rep.dzCode?"https://www.digitalzone.co.kr/products/"+B2B.esc(rep.dzCode):null;
      var shopbyUrl=rep.dzCode?"https://service.shopby.co.kr/product/edit?globalProductNo=0&mallProductNo="+encodeURIComponent(rep.dzCode):null;

      // 최저 매입가
      var minBuy=Infinity;
      if(grp.length>1) grp.forEach(function(r){ var b=+(r.buyEx||0); if(b>0&&b<minBuy) minBuy=b; });

      // 제품명 행
      html+='<tr class="name-row"><td colspan="15">';
      html+=url?('<a href="'+url+'" target="_blank">'+B2B.esc(rep.name||"(품목명 없음)")+'</a>'):B2B.esc(rep.name||"(품목명 없음)");
      if(grp.length>1) html+='<span class="cnt">'+grp.length+'개 거래처</span>';
      if(shopbyUrl) html+='<a href="'+shopbyUrl+'" target="_blank" class="shopby-btn">샵바이 가격수정 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>';
      html+='</td></tr>';

      grp.forEach(function(r){
        var rid=r.id, c=calc(r);
        var isBest=grp.length>1&&+(r.buyEx||0)>0&&+(r.buyEx||0)===minBuy;
        html+='<tr'+(isBest?' class="best-price"':'')+'>';
        // 공급처
        html+='<td style="position:relative;padding:0"><input class="ri ri-l" id="ri-v-'+rid+'" value="'+B2B.esc(r.vendor)+'" placeholder="공급처" style="padding-left:14px">'+(isBest?'<span class="best-badge" style="position:absolute;right:4px;top:50%;transform:translateY(-50%)">최저</span>':'')+'</td>';
        html+='<td><input class="ri" id="ri-c-'+rid+'" value="'+B2B.esc(r.dzCode)+'" placeholder="코드"></td>';
        html+='<td><input class="ri" id="ri-e-'+rid+'" value="'+B2B.esc(r.erpCode)+'" placeholder="ERP"></td>';
        html+='<td style="border-right:2px solid #ced4da"><div class="cv cv-c">'+B2B.esc(r.cycle||"-")+'</div></td>';
        html+='<td><input class="ri ri-r" id="ri-b-'+rid+'" value="'+fmtN(r.buyEx)+'" placeholder="0" onfocus="B2B.nF(this)" onblur="B2B.nB(this,\''+rid+'\')" oninput="B2B.lC(\''+rid+'\')"></td>';
        html+='<td style="border-right:2px solid #93a8f4"><div class="cv cv-r cv-bold" id="rc-bi-'+rid+'">'+fmtK(c.bInc)+'</div></td>';
        html+='<td class="td-card"><input class="ri ri-r" id="ri-cs-'+rid+'" value="'+fmtN(r.cardSellEx)+'" placeholder="0" onfocus="B2B.nF(this)" onblur="B2B.nB(this,\''+rid+'\')" oninput="B2B.lC(\''+rid+'\')"></td>';
        html+='<td class="td-card"><div class="cv cv-r cv-bold" id="rc-ci-'+rid+'">'+fmtK(c.cInc)+'</div></td>';
        html+='<td class="td-card" id="rc-cm-'+rid+'">'+pCell(c.cMg)+'</td>';
        html+='<td class="td-card" style="border-right:2px solid #93c5e8" id="rc-cp-'+rid+'">'+pCell(c.cPf)+'</td>';
        html+='<td class="td-cash"><input class="ri ri-r" id="ri-hs-'+rid+'" value="'+fmtN(r.cashSellEx)+'" placeholder="0" onfocus="B2B.nF(this)" onblur="B2B.nB(this,\''+rid+'\')" oninput="B2B.lC(\''+rid+'\')"></td>';
        html+='<td class="td-cash"><div class="cv cv-r cv-bold" id="rc-hi-'+rid+'">'+fmtK(c.hInc)+'</div></td>';
        html+='<td class="td-cash" id="rc-hm-'+rid+'">'+pCell(c.hMg)+'</td>';
        html+='<td class="td-cash" id="rc-hp-'+rid+'">'+pCell(c.hPf)+'</td>';
        html+='<td><div class="act-cell"><button class="edit-btn" onclick="B2B.saveRow(\''+rid+'\')">수정</button><button class="del-btn" onclick="B2B.delRow(\''+rid+'\')">삭제</button></div></td>';
        html+='</tr>';
      });
    });
    el.innerHTML=html;
  },

  esc: function(s){ return(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/'/g,"&#39;"); },
  nid: function(){ return Math.random().toString(36).slice(2,9); },
  toast: function(msg){ var t=document.getElementById("toast"); t.textContent=msg; t.style.display="block"; setTimeout(function(){ t.style.display="none"; },2500); }
};

// 검색창 외부 클릭 시 결과 닫기
document.addEventListener("click", function(e){
  var res=document.getElementById("addResults");
  if(res&&!res.contains(e.target)&&e.target.id!=="addSearch") res.style.display="none";
});
</script>
</body>
</html>
